apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaseflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leaseflow-frontend
  template:
    metadata:
      labels:
        app: leaseflow-frontend
    spec:
      containers:
        - name: leaseflow-frontend
          # Replace with a pinned image tag — never use :latest in production
          image: leaseflow-frontend:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: leaseflow-frontend
spec:
  type: ClusterIP
  selector:
    app: leaseflow-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leaseflow-frontend-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    # Replace with your actual domain
    - host: YOUR_DOMAIN_HERE
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: leaseflow-frontend
                port:
                  number: 80
